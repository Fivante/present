<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабачковий рандом</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  text-align:center;
  padding:30px;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("background.jpg") no-repeat center center/cover;
}

/* затемнення */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  z-index:-1;
}

h1{margin-bottom:5px;}

#signin{
  position:absolute;
  top:10px;
  right:15px;
  font-size:12px;
  opacity:0.6;
  cursor:pointer;
}

.wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  flex-wrap:wrap;
}

.pointer{
  width:0;
  height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:24px solid #fff;
  margin:0 auto;
  transform:translateY(-8px);
}

.wheel{
  width:320px;
  height:320px;
  border-radius:50%;
  border:8px solid #333;
  transition:transform 6s cubic-bezier(0.2,0.8,0.2,1);
}

.side{
  text-align:left;
  line-height:1.8;
}

.dot{
  width:12px;
  height:12px;
  display:inline-block;
  border-radius:3px;
  margin-right:10px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  cursor:pointer;
}

button:disabled{
  background:#555;
  cursor:not-allowed;
}

#modal, #loginModal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#1e1e24;
  padding:25px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="signin">Sign IN</div>

<h1>КАБАЧКОВИЙ РАНДОМ🎁</h1>
<div id="tries"></div>

<div class="wrap">

<div>
<div class="pointer"></div>
<div class="wheel" id="wheel"></div>
</div>

<div class="side" id="side"></div>

</div>

<button id="btn">Крутити рулєтку</button>

<div id="result"></div>
<div id="wins"></div>

<button id="claimBtn" style="display:none;">Забрати подарунки</button>

<div id="modal">
  <div class="box">
    <p>Замовлення прийнято, орієнтована доставка призів: 1 травня</p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<div id="loginModal">
  <div class="box">
    <p>Введи пароль</p>
    <input id="pass" type="password">
    <br><br>
    <button onclick="checkPass()">OK</button>
  </div>
</div>

<script>
const segments=[
"Вовчик","Французька капуста","Чоколатерія","Коробка крабових паличок",
"President","Шолом","Смішка","Інкубатор"
];

const colors=[
"#ff4d4d","#4dff88","#4da6ff","#ffd24d",
"#b84dff","#ff4d9a","#00e5ff","#ff9100"
];

const wheel=document.getElementById("wheel");
const btn=document.getElementById("btn");
const result=document.getElementById("result");
const side=document.getElementById("side");
const triesDiv=document.getElementById("tries");
const winsDiv=document.getElementById("wins");
const claimBtn=document.getElementById("claimBtn");
const modal=document.getElementById("modal");
const loginModal=document.getElementById("loginModal");

let spins=parseInt(localStorage.getItem("spins")||"0");
let wins=JSON.parse(localStorage.getItem("wins")||"[]");
let rotation=0;

wheel.style.background=`conic-gradient(${colors.map((c,i)=>`${c} ${i*(360/segments.length)}deg ${(i+1)*(360/segments.length)}deg`).join(",")})`;

segments.forEach((t,i)=>{
  const el=document.createElement("div");
  el.innerHTML=`<span class='dot' style='background:${colors[i]}'></span>${t}`;
  side.appendChild(el);
});

function updateTries(){
  triesDiv.textContent="Спроб залишилось: "+(3-spins);
}

function renderWins(){
  winsDiv.innerHTML="<h3>Отримані подарунки:</h3>"+wins.map(w=>`<div>• ${w}</div>`).join("");
}

function getTarget(){
  if(spins===0) return 0;
  if(spins===1) return 4;
  if(spins===2) return 1;
  return Math.floor(Math.random()*segments.length);
}

btn.onclick=spin;

function spin(){
  if(spins>=3){
    btn.disabled=true;
    return;
  }

  btn.disabled=true;

  const target=getTarget();
  const segment=360/segments.length;

  const current=rotation%360;
  const targetAngle=360-(target*segment+segment/2);
  const delta=targetAngle-current;

  rotation+=6*360+delta;

  wheel.style.transform=`rotate(${rotation}deg)`;

  result.textContent="...крутимо...";

  setTimeout(()=>{
    const prize=segments[target];

    result.textContent="Отже, твій подарунок: "+prize;

    wins.push(prize);
    localStorage.setItem("wins",JSON.stringify(wins));

    spins++;
    localStorage.setItem("spins",spins);

    renderWins();
    updateTries();

    if(spins<3){
      btn.disabled=false;
    }else{
      btn.disabled=true;
      claimBtn.style.display="inline-block";
    }

  },6000);
}

claimBtn.onclick=()=>modal.style.display="flex";

function closeModal(){
  modal.style.display="none";
}

document.getElementById("signin").onclick=()=>{
  loginModal.style.display="flex";
};

function checkPass(){
  const val=document.getElementById("pass").value;

  if(val==="TANOS"){
    localStorage.clear();
    spins=0;
    wins=[];
    rotation=0;

    btn.disabled=false;
    claimBtn.style.display="none";
    result.textContent="....";

    renderWins();
    updateTries();

    loginModal.style.display="none";
  }else{
    alert("Невірний пароль");
  }
}

renderWins();
updateTries();
</script>

</body>
</html>
